name: Rollback main from issue

on:
    issues:
        types: [labeled]

jobs:
    rollback:
        if: github.event.label.name == 'publish' && contains(github.event.issue.labels.*.name, 'rollback')
        runs-on: ubuntu-latest
        permissions:
            contents: write
            issues: write
            pull-requests: write
        steps:
            - name: Check permission
              uses: ./.github/actions/check-permission
              with:
                  token: ${{ github.token }}
                  sender: ${{ github.event.sender.login }}
                  issue-number: ${{ github.event.issue.number }}
                  repo: ${{ github.repository }}
                  error-message: Only maintainers with write access can trigger a rollback.

            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  ref: main

            - name: Revert and create PR
              env:
                  GH_TOKEN: ${{ github.token }}
                  ISSUE_NUMBER: ${{ github.event.issue.number }}
                  ISSUE_BODY: ${{ github.event.issue.body }}
              run: |
                  python3 - <<'PYEOF'
                  import os, subprocess, sys
                  sys.path.insert(0, '.github/scripts')
                  from issue_helpers import extract

                  issue_number = os.environ['ISSUE_NUMBER']

                  reason = extract('Reason') or 'No reason provided.'

                  commit_sha = subprocess.check_output(['git', 'rev-parse', 'HEAD']).decode().strip()
                  commit_msg = subprocess.check_output(['git', 'log', '-1', '--pretty=%s']).decode().strip()
                  short_sha = commit_sha[:7]
                  branch = f'rollback/issue-{issue_number}'

                  subprocess.run(['git', 'config', 'user.name', 'github-actions[bot]'], check=True)
                  subprocess.run(['git', 'config', 'user.email', 'github-actions[bot]@users.noreply.github.com'], check=True)
                  subprocess.run(['git', 'checkout', '-b', branch], check=True)
                  subprocess.run(['git', 'revert', 'HEAD', '--no-edit'], check=True)
                  subprocess.run(['git', 'push', 'origin', branch], check=True)

                  pr_body = f'Reverts {short_sha} ("{commit_msg}")\n\n**Reason:** {reason}\n\nCloses #{issue_number}'

                  subprocess.run([
                      'gh', 'pr', 'create',
                      '--title', f'Rollback: {commit_msg}',
                      '--body', pr_body,
                      '--base', 'main',
                      '--head', branch,
                  ], check=True)
                  PYEOF
