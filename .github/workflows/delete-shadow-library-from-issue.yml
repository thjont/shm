name: Delete shadow library from issue

on:
    issues:
        types: [labeled]

jobs:
    delete-shadow-library:
        if: github.event.label.name == 'publish' && contains(github.event.issue.labels.*.name, 'delete-shadow-library')
        runs-on: ubuntu-latest
        permissions:
            contents: write
            issues: write
            pull-requests: write
        steps:
            - name: Check permission
              env:
                  GH_TOKEN: ${{ github.token }}
                  SENDER: ${{ github.event.sender.login }}
                  ISSUE_NUMBER: ${{ github.event.issue.number }}
                  REPO: ${{ github.repository }}
              run: |
                  PERMISSION=$(gh api "repos/${REPO}/collaborators/${SENDER}/permission" --jq '.permission' 2>/dev/null || echo "none")
                  if [[ "$PERMISSION" != "admin" && "$PERMISSION" != "write" ]]; then
                    gh issue comment "$ISSUE_NUMBER" --body "@${SENDER} Only maintainers with write access can delete shadow libraries."
                    gh issue close "$ISSUE_NUMBER"
                    exit 1
                  fi

            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

            - name: Validate and remove shadow library config
              id: library
              env:
                  ISSUE_BODY: ${{ github.event.issue.body }}
                  ISSUE_NUMBER: ${{ github.event.issue.number }}
                  GH_TOKEN: ${{ github.token }}
              run: |
                  python3 - <<'PYEOF'
                  import json, os, re, subprocess, sys

                  body = os.environ['ISSUE_BODY']
                  issue_number = os.environ['ISSUE_NUMBER']

                  def extract(label):
                      m = re.search(rf'### {re.escape(label)}\n\n(.*?)(?=\n### |\Z)', body, re.DOTALL)
                      if not m:
                          return ''
                      v = m.group(1).strip()
                      return '' if v == '_No response_' else v

                  slug = extract('Slug').strip()

                  if not re.match(r'^[a-z0-9][a-z0-9-]*$', slug):
                      print(f'::error::Invalid slug: {slug!r}')
                      subprocess.run(['gh', 'issue', 'comment', issue_number, '--body', f'Invalid slug: `{slug}`.'], check=True)
                      sys.exit(1)

                  config_path = f'shiny-hoppy-meeple/data/sources/shadow-libraries/{slug}.json'
                  if not os.path.exists(config_path):
                      print(f'::error::No shadow library with slug: {slug!r}')
                      subprocess.run(['gh', 'issue', 'comment', issue_number, '--body', f'No shadow library found with slug `{slug}`.'], check=True)
                      sys.exit(1)

                  with open(config_path) as f:
                      config = json.load(f)
                  display_name = config.get('display_name', slug)

                  os.remove(config_path)

                  with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
                      out.write(f'slug={slug}\n')
                      out.write(f'display_name={display_name}\n')
                      out.write(f'config_path={config_path}\n')
                  PYEOF

            - name: Create branch and open PR
              env:
                  GH_TOKEN: ${{ github.token }}
                  SLUG: ${{ steps.library.outputs.slug }}
                  DISPLAY_NAME: ${{ steps.library.outputs.display_name }}
                  CONFIG_PATH: ${{ steps.library.outputs.config_path }}
                  ISSUE_NUMBER: ${{ github.event.issue.number }}
              run: |
                  BRANCH="delete-shadow-library/${SLUG}"
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git checkout -b "$BRANCH"
                  git rm "$CONFIG_PATH"
                  git commit -m "Remove shadow library ${DISPLAY_NAME} (#${ISSUE_NUMBER})"
                  git push origin "$BRANCH"
                  gh pr create \
                    --title "Delete shadow library: ${DISPLAY_NAME}" \
                    --body "Closes #${ISSUE_NUMBER}" \
                    --base main \
                    --head "$BRANCH"
