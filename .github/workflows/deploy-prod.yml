name: Deploy to prod environment

on:
    push:
        branches: [main]
        paths:
            - "shiny-hoppy-meeple/**"
    schedule:
        - cron: "0 8-23 * * *"
    workflow_dispatch:
jobs:
    deploy:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            deployments: write
        steps:
            - name: Checkout code
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  submodules: true

            - name: Set up Node.js
              uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
              with:
                  node-version: "22"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Restore BGG cache
              run: scripts/cache-pull.sh prod

            - name: Sync Google Calendar
              env:
                  GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
                  GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
              run: node scripts/calendar-sync.js

            - name: Sync definitions from Google Sheets
              env:
                  GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
                  GOOGLE_SHEETS_SPREADSHEET_ID: ${{ secrets.GOOGLE_SHEETS_SPREADSHEET_ID }}
              run: node scripts/sheets-sync.js

            - name: Export libraries
              env:
                  BGG_API_TOKEN: ${{ secrets.BGG_API_TOKEN }}
              run: |
                  for f in shiny-hoppy-meeple/data/definitions/libraries/*.json; do
                    slug=$(basename "$f" .json)
                    echo "--- library: $slug"
                    node scripts/bgg-export.js --library "$slug" --skip-existing-games \
                      || echo "::warning::Export failed for library '$slug'"
                  done

            - name: Export members
              env:
                  BGG_API_TOKEN: ${{ secrets.BGG_API_TOKEN }}
              run: node scripts/bgg-export-members.js --skip-existing-games

            - name: Push BGG cache
              run: scripts/cache-push.sh prod

            - name: Setup Hugo
              uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78 # v3.2.1
              with:
                  hugo-version: "0.163.1"
                  extended: true

            - name: Build site
              run: pushd shiny-hoppy-meeple && hugo --minify && popd

            - name: Deploy to Cloudflare Pages
              uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
              with:
                  apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  workingDirectory: shiny-hoppy-meeple
                  command: pages deploy --commit-hash=${{ github.sha }}
