name: Delete game override from issue

on:
    issues:
        types: [labeled]

jobs:
    delete-game-override:
        if: github.event.label.name == 'publish' && contains(github.event.issue.labels.*.name, 'delete-game-override')
        runs-on: ubuntu-latest
        permissions:
            contents: write
            issues: write
            pull-requests: write
        steps:
            - name: Check permission
              uses: ./.github/actions/check-permission
              with:
                  token: ${{ github.token }}
                  sender: ${{ github.event.sender.login }}
                  issue-number: ${{ github.event.issue.number }}
                  repo: ${{ github.repository }}
                  error-message: Only maintainers with write access can delete game overrides.

            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

            - name: Validate and remove override file
              id: override
              env:
                  ISSUE_BODY: ${{ github.event.issue.body }}
                  ISSUE_NUMBER: ${{ github.event.issue.number }}
                  GH_TOKEN: ${{ github.token }}
              run: |
                  python3 - <<'PYEOF'
                  import os, sys
                  sys.path.insert(0, '.github/scripts')
                  from issue_helpers import extract, comment, set_output

                  issue_number = os.environ['ISSUE_NUMBER']

                  bgg_id = extract('BGG Game ID').strip()

                  if not bgg_id.isdigit():
                      print(f'::error::Invalid BGG Game ID: {bgg_id!r}')
                      comment(issue_number, f'Invalid BGG Game ID: `{bgg_id}`. Must be a number.')
                      sys.exit(1)

                  path = f'shiny-hoppy-meeple/data/definitions/games-bgg-override/{bgg_id}.json'
                  if not os.path.exists(path):
                      print(f'::error::No override found for BGG game {bgg_id}')
                      comment(issue_number, f'No override found for BGG game [{bgg_id}](https://boardgamegeek.com/boardgame/{bgg_id}).')
                      sys.exit(1)

                  os.remove(path)

                  set_output('bgg_id', bgg_id)
                  set_output('path', path)
                  PYEOF

            - name: Create branch and open PR
              env:
                  GH_TOKEN: ${{ github.token }}
                  BGG_ID: ${{ steps.override.outputs.bgg_id }}
                  OVERRIDE_PATH: ${{ steps.override.outputs.path }}
                  ISSUE_NUMBER: ${{ github.event.issue.number }}
              run: |
                  BRANCH="delete-override/${BGG_ID}"
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git checkout -b "$BRANCH"
                  git rm "$OVERRIDE_PATH"
                  git commit -m "Remove game override for BGG #${BGG_ID} (#${ISSUE_NUMBER})"
                  git push origin "$BRANCH"
                  gh pr create \
                    --title "Delete game override: BGG #${BGG_ID}" \
                    --body "Closes #${ISSUE_NUMBER}" \
                    --base main \
                    --head "$BRANCH"
