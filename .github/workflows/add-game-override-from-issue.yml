name: Add game override from issue

on:
    issues:
        types: [labeled]

jobs:
    create-override:
        if: github.event.label.name == 'publish' && contains(github.event.issue.labels.*.name, 'new-game-override')
        runs-on: ubuntu-latest
        permissions:
            contents: write
            issues: write
            pull-requests: write
        steps:
            - name: Check permission
              uses: ./.github/actions/check-permission
              with:
                  token: ${{ github.token }}
                  sender: ${{ github.event.sender.login }}
                  issue-number: ${{ github.event.issue.number }}
                  repo: ${{ github.repository }}
                  error-message: Only maintainers with write access can create game overrides.

            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Parse issue and write override file
              id: override
              env:
                  ISSUE_BODY: ${{ github.event.issue.body }}
                  ISSUE_NUMBER: ${{ github.event.issue.number }}
                  GH_TOKEN: ${{ github.token }}
              run: |
                  python3 - <<'PYEOF'
                  import json, os, sys
                  sys.path.insert(0, '.github/scripts')
                  from issue_helpers import extract, comment, set_output

                  issue_number = os.environ['ISSUE_NUMBER']

                  bgg_id = extract('BGG Game ID').strip()
                  desc   = extract('Description')
                  video  = extract('Learn to Play Video ID').strip()

                  if not bgg_id.isdigit():
                      print(f'::error::Invalid BGG Game ID: {bgg_id!r}')
                      comment(issue_number, f'Invalid BGG Game ID: `{bgg_id}`. Must be a number.')
                      sys.exit(1)

                  if not desc and not video:
                      print('::error::No fields provided — nothing to override.')
                      comment(issue_number, 'No fields were provided. Please supply a Description, a Learn to Play Video ID, or both.')
                      sys.exit(1)

                  path = f'shiny-hoppy-meeple/data/definitions/games-bgg-override/{bgg_id}.json'
                  data = {}
                  if os.path.exists(path):
                      with open(path) as f:
                          data = json.load(f)

                  if desc:
                      data['description'] = desc
                  if video:
                      data['learn_to_play_video'] = video

                  with open(path, 'w') as f:
                      json.dump(data, f, indent=2)
                      f.write('\n')

                  set_output('bgg_id', bgg_id)
                  set_output('path', path)
                  PYEOF

            - name: Create branch and open PR
              env:
                  GH_TOKEN: ${{ github.token }}
                  BGG_ID: ${{ steps.override.outputs.bgg_id }}
                  OVERRIDE_PATH: ${{ steps.override.outputs.path }}
                  ISSUE_NUMBER: ${{ github.event.issue.number }}
              run: |
                  BRANCH="game-override/${BGG_ID}"
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git checkout -b "$BRANCH"
                  git add "$OVERRIDE_PATH"
                  git commit -m "Add game override for BGG #${BGG_ID} (#${ISSUE_NUMBER})"
                  git push origin "$BRANCH"
                  gh pr create \
                    --title "Game override: BGG #${BGG_ID}" \
                    --body "Closes #${ISSUE_NUMBER}" \
                    --base main \
                    --head "$BRANCH"
