name: Add member from issue

on:
    issues:
        types: [labeled]

jobs:
    add-member:
        if: github.event.label.name == 'publish' && contains(github.event.issue.labels.*.name, 'new-member')
        runs-on: ubuntu-latest
        permissions:
            contents: write
            issues: write
            pull-requests: write
        steps:
            - name: Check permission
              uses: ./.github/actions/check-permission
              with:
                  token: ${{ github.token }}
                  sender: ${{ github.event.sender.login }}
                  issue-number: ${{ github.event.issue.number }}
                  repo: ${{ github.repository }}
                  error-message: Only maintainers with write access can add members.

            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Parse issue and write member files
              id: member
              env:
                  ISSUE_BODY: ${{ github.event.issue.body }}
                  ISSUE_NUMBER: ${{ github.event.issue.number }}
                  GH_TOKEN: ${{ github.token }}
              run: |
                  python3 - <<'PYEOF'
                  import json, os, sys
                  sys.path.insert(0, '.github/scripts')
                  from issue_helpers import extract, comment, set_output, validate_slug

                  issue_number = os.environ['ISSUE_NUMBER']

                  # Collapse all whitespace (incl. newlines) so display_name cannot
                  # inject extra lines into $GITHUB_OUTPUT or break the commit/PR title.
                  display_name = ' '.join(extract('Display Name').split())
                  slug         = extract('Slug').strip()
                  description  = extract('Description')
                  bgg_username = extract('BGG Username').strip()
                  geeklist_id  = extract('BGG GeekList ID').strip()

                  validate_slug(issue_number, slug)

                  if not bgg_username and not geeklist_id:
                      print('::error::No BGG source provided.')
                      comment(issue_number, 'Please provide either a BGG Username or a BGG GeekList ID.')
                      sys.exit(1)

                  if geeklist_id and not geeklist_id.isdigit():
                      print(f'::error::Invalid GeekList ID: {geeklist_id!r}')
                      comment(issue_number, f'Invalid GeekList ID: `{geeklist_id}`. Must be a number.')
                      sys.exit(1)

                  config_dir = 'shiny-hoppy-meeple/data/definitions/members'
                  os.makedirs(config_dir, exist_ok=True)

                  config_path = f'{config_dir}/{slug}.json'
                  if os.path.exists(config_path):
                      print(f'::error::Slug already exists: {slug!r}')
                      comment(issue_number, f'A member with slug `{slug}` already exists.')
                      sys.exit(1)

                  data = {'slug': slug, 'display_name': display_name}
                  if description:
                      data['description'] = description
                  if bgg_username:
                      data['username'] = bgg_username
                  if geeklist_id:
                      data['geeklist'] = int(geeklist_id)

                  with open(config_path, 'w') as f:
                      json.dump(data, f, indent=2)
                      f.write('\n')

                  set_output('slug', slug)
                  set_output('display_name', display_name)
                  set_output('config_path', config_path)
                  PYEOF

            - name: Create branch and open PR
              env:
                  GH_TOKEN: ${{ github.token }}
                  SLUG: ${{ steps.member.outputs.slug }}
                  DISPLAY_NAME: ${{ steps.member.outputs.display_name }}
                  CONFIG_PATH: ${{ steps.member.outputs.config_path }}
                  ISSUE_NUMBER: ${{ github.event.issue.number }}
              run: |
                  BRANCH="member/${SLUG}"
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git checkout -b "$BRANCH"
                  git add "$CONFIG_PATH"
                  git commit -m "Add member ${DISPLAY_NAME} (#${ISSUE_NUMBER})"
                  git push origin "$BRANCH"
                  gh pr create \
                    --title "New member: ${DISPLAY_NAME}" \
                    --body "Closes #${ISSUE_NUMBER}" \
                    --base main \
                    --head "$BRANCH"
