name: Deploy to stage environment

on:
    workflow_dispatch:

jobs:
    deploy:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            deployments: write
        steps:
            - name: Checkout code
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  submodules: true

            - name: Set up Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: "20"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
              with:
                  python-version: "3.12"
                  cache: pip

            - name: Install Python dependencies
              run: pip install -r requirements.txt

            - name: Sync definitions from Google Sheets
              env:
                  GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
                  GOOGLE_SHEETS_SPREADSHEET_ID: ${{ secrets.GOOGLE_SHEETS_SPREADSHEET_ID }}
              run: node shiny-hoppy-meeple/sheets-sync.js

            - name: Export libraries
              env:
                  BGG_API_TOKEN: ${{ secrets.BGG_API_TOKEN }}
              run: |
                  python3 - <<'PYEOF'
                  import json, os, subprocess, sys
                  from pathlib import Path

                  data_dir = Path('shiny-hoppy-meeple/data')
                  for def_file in sorted((data_dir / 'definitions' / 'libraries').glob('*.json')):
                      slug = def_file.stem
                      print(f'--- library: {slug}', flush=True)
                      r = subprocess.run(
                          [sys.executable, 'bgg_export.py', '--library', slug, '--skip-existing-games'],
                          check=False)
                      if r.returncode:
                          print(f'::warning::Export failed for library {slug!r}', file=sys.stderr)
                  PYEOF

            - name: Export members
              env:
                  BGG_API_TOKEN: ${{ secrets.BGG_API_TOKEN }}
              run: |
                  python3 - <<'PYEOF'
                  import json, os, subprocess, sys
                  from pathlib import Path

                  data_dir = Path('shiny-hoppy-meeple/data')
                  for def_file in sorted((data_dir / 'definitions' / 'members').glob('*.json')):
                      defn = json.loads(def_file.read_text())
                      slug = defn.get('slug') or def_file.stem
                      out = str(data_dir / 'bgg-cache' / 'collections' / f'{slug}.json')
                      env = dict(os.environ)
                      if 'geeklist' in defn:
                          cmd = [sys.executable, 'bgg_export.py',
                                 '--geeklist', str(defn['geeklist']),
                                 '--collection-file', out,
                                 '--skip-existing-games']
                      elif 'username' in defn:
                          env['BGG_USERNAME'] = defn['username']
                          cmd = [sys.executable, 'bgg_export.py',
                                 '--collection-file', out,
                                 '--skip-existing-games']
                      else:
                          print(f'::warning::No geeklist or username in {def_file}', file=sys.stderr)
                          continue
                      print(f'--- member: {slug}', flush=True)
                      r = subprocess.run(cmd, env=env, check=False)
                      if r.returncode:
                          print(f'::warning::Export failed for member {slug!r}', file=sys.stderr)
                  PYEOF

            - name: Setup Hugo
              uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78 # v3.2.1
              with:
                  hugo-version: "0.163.1"
                  extended: true

            - name: Build site
              run: pushd shiny-hoppy-meeple && hugo --minify --buildFuture --baseURL "https://stage-shiny-hoppy-meeple.pages.dev/" && popd

            - name: Use stage wrangler config
              run: cp shiny-hoppy-meeple/wrangler-stage.toml shiny-hoppy-meeple/wrangler.toml

            - name: Deploy to Cloudflare Pages
              uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
              with:
                  apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  workingDirectory: shiny-hoppy-meeple
                  command: pages deploy --commit-hash=${{ github.sha }}
