name: Create game override from issue

on:
    issues:
        types: [labeled]

jobs:
    create-override:
        if: github.event.label.name == 'publish' && contains(github.event.issue.labels.*.name, 'game-override')
        runs-on: ubuntu-latest
        permissions:
            contents: write
            issues: write
        steps:
            - name: Check permission
              env:
                  GH_TOKEN: ${{ github.token }}
                  SENDER: ${{ github.event.sender.login }}
                  ISSUE_NUMBER: ${{ github.event.issue.number }}
                  REPO: ${{ github.repository }}
              run: |
                  PERMISSION=$(gh api "repos/${REPO}/collaborators/${SENDER}/permission" --jq '.permission' 2>/dev/null || echo "none")
                  if [[ "$PERMISSION" != "admin" && "$PERMISSION" != "write" ]]; then
                    gh issue comment "$ISSUE_NUMBER" --body "@${SENDER} Only maintainers with write access can create game overrides."
                    gh issue close "$ISSUE_NUMBER"
                    exit 1
                  fi

            - uses: actions/checkout@v4

            - name: Parse issue and write override file
              id: override
              env:
                  ISSUE_BODY: ${{ github.event.issue.body }}
                  ISSUE_NUMBER: ${{ github.event.issue.number }}
                  GH_TOKEN: ${{ github.token }}
              run: |
                  python3 - <<'PYEOF'
                  import json, os, re, sys

                  body = os.environ['ISSUE_BODY']
                  issue_number = os.environ['ISSUE_NUMBER']

                  def extract(label):
                      m = re.search(rf'### {re.escape(label)}\n\n(.*?)(?=\n### |\Z)', body, re.DOTALL)
                      if not m:
                          return ''
                      v = m.group(1).strip()
                      return '' if v == '_No response_' else v

                  bgg_id    = extract('BGG Game ID').strip()
                  desc      = extract('Description')
                  video     = extract('Learn to Play Video ID').strip()

                  if not bgg_id.isdigit():
                      print(f'::error::Invalid BGG Game ID: {bgg_id!r}')
                      os.system(f'gh issue comment {issue_number} --body "Invalid BGG Game ID: `{bgg_id}`. Must be a number."')
                      sys.exit(1)

                  if not desc and not video:
                      print('::error::No fields provided — nothing to override.')
                      os.system(f'gh issue comment {issue_number} --body "No fields were provided. Please supply a Description, a Learn to Play Video ID, or both."')
                      sys.exit(1)

                  path = f'shiny-hoppy-meeple/data/games-overrides/{bgg_id}.json'
                  data = {}
                  if os.path.exists(path):
                      with open(path) as f:
                          data = json.load(f)

                  if desc:
                      data['description'] = desc
                  if video:
                      data['learn_to_play_video'] = video

                  with open(path, 'w') as f:
                      json.dump(data, f, indent=2)
                      f.write('\n')

                  with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
                      out.write(f'bgg_id={bgg_id}\n')
                      out.write(f'path={path}\n')
                  PYEOF

            - name: Commit and push
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add "${{ steps.override.outputs.path }}"
                  git commit -m "Add game override for BGG #${{ steps.override.outputs.bgg_id }} (#${{ github.event.issue.number }})"
                  git push

            - name: Trigger deploy
              env:
                  GH_TOKEN: ${{ github.token }}
              run: gh workflow run deploy.yml --ref main

            - name: Close issue
              env:
                  GH_TOKEN: ${{ github.token }}
                  ISSUE_NUMBER: ${{ github.event.issue.number }}
                  BGG_ID: ${{ steps.override.outputs.bgg_id }}
              run: |
                  gh issue close "$ISSUE_NUMBER" --comment "Override created for BGG game [#${BGG_ID}](https://boardgamegeek.com/boardgame/${BGG_ID})."
