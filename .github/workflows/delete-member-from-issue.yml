name: Delete member from issue

on:
    issues:
        types: [labeled]

jobs:
    delete-member:
        if: github.event.label.name == 'publish' && contains(github.event.issue.labels.*.name, 'delete-member')
        runs-on: ubuntu-latest
        permissions:
            contents: write
            issues: write
            pull-requests: write
        steps:
            - name: Check permission
              uses: ./.github/actions/check-permission
              with:
                  token: ${{ github.token }}
                  sender: ${{ github.event.sender.login }}
                  issue-number: ${{ github.event.issue.number }}
                  repo: ${{ github.repository }}
                  error-message: Only maintainers with write access can delete members.

            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Validate and remove member files
              id: member
              env:
                  ISSUE_BODY: ${{ github.event.issue.body }}
                  ISSUE_NUMBER: ${{ github.event.issue.number }}
                  GH_TOKEN: ${{ github.token }}
              run: |
                  python3 - <<'PYEOF'
                  import json, os, sys
                  sys.path.insert(0, '.github/scripts')
                  from issue_helpers import extract, comment, set_output, validate_slug

                  issue_number = os.environ['ISSUE_NUMBER']

                  slug = extract('Slug').strip()

                  validate_slug(issue_number, slug)

                  config_path = f'shiny-hoppy-meeple/data/definitions/members/{slug}.json'
                  if not os.path.exists(config_path):
                      print(f'::error::No member with slug: {slug!r}')
                      comment(issue_number, f'No member found with slug `{slug}`.')
                      sys.exit(1)

                  with open(config_path) as f:
                      config = json.load(f)
                  display_name = config.get('display_name', slug)

                  os.remove(config_path)

                  member_path = f'shiny-hoppy-meeple/data/bgg-cache/collections/{slug}.json'
                  member_exists = os.path.exists(member_path)
                  if member_exists:
                      os.remove(member_path)

                  set_output('slug', slug)
                  set_output('display_name', display_name)
                  set_output('config_path', config_path)
                  set_output('member_path', member_path)
                  set_output('member_exists', 'true' if member_exists else 'false')
                  PYEOF

            - name: Create branch and open PR
              env:
                  GH_TOKEN: ${{ github.token }}
                  SLUG: ${{ steps.member.outputs.slug }}
                  DISPLAY_NAME: ${{ steps.member.outputs.display_name }}
                  CONFIG_PATH: ${{ steps.member.outputs.config_path }}
                  MEMBER_PATH: ${{ steps.member.outputs.member_path }}
                  MEMBER_EXISTS: ${{ steps.member.outputs.member_exists }}
                  ISSUE_NUMBER: ${{ github.event.issue.number }}
              run: |
                  BRANCH="delete-member/${SLUG}"
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git checkout -b "$BRANCH"
                  git rm "$CONFIG_PATH"
                  [ "$MEMBER_EXISTS" = "true" ] && git rm "$MEMBER_PATH"
                  git commit -m "Remove member ${DISPLAY_NAME} (#${ISSUE_NUMBER})"
                  git push origin "$BRANCH"
                  gh pr create \
                    --title "Delete member: ${DISPLAY_NAME}" \
                    --body "Closes #${ISSUE_NUMBER}" \
                    --base main \
                    --head "$BRANCH"
