name: Deploy to Cloudflare Pages

on:
    push:
        branches: [main]
        paths:
            - "shiny-hoppy-meeple/**"
    pull_request:
        branches: [main]
        paths:
            - "shiny-hoppy-meeple/**"
jobs:
    deploy:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            deployments: write
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  submodules: true

            - name: Setup Hugo
              uses: peaceiris/actions-hugo@v3
              with:
                  hugo-version: "latest"
                  extended: true

            - name: Build site
              run: pushd shiny-hoppy-meeple && hugo --minify && popd

            - name: Deploy to Cloudflare Pages
              uses: cloudflare/wrangler-action@v3
              with:
                  apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  workingDirectory: shiny-hoppy-meeple
                  command: pages deploy --commit-hash=${{ github.sha }}
