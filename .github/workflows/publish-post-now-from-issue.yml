name: Publish post now from issue

on:
    issues:
        types: [labeled]

jobs:
    publish-now:
        if: github.event.label.name == 'publish' && contains(github.event.issue.labels.*.name, 'publish-post-now')
        runs-on: ubuntu-latest
        permissions:
            contents: write
            issues: write
            pull-requests: write
        steps:
            - name: Check permission
              uses: ./.github/actions/check-permission
              with:
                  token: ${{ github.token }}
                  sender: ${{ github.event.sender.login }}
                  issue-number: ${{ github.event.issue.number }}
                  repo: ${{ github.repository }}
                  error-message: Only maintainers with write access can publish posts.
                  failure-action: remove-label

            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Remove scheduling and visibility constraints
              id: post
              env:
                  ISSUE_BODY: ${{ github.event.issue.body }}
                  ISSUE_NUMBER: ${{ github.event.issue.number }}
                  GH_TOKEN: ${{ github.token }}
              run: |
                  python3 - <<'PYEOF'
                  import os, sys
                  sys.path.insert(0, '.github/scripts')
                  from issue_helpers import extract, comment, set_output, validate_slug

                  issue_number = os.environ['ISSUE_NUMBER']

                  slug = extract('Post Slug').strip()

                  validate_slug(issue_number, slug,
                                hint='Use the slug from the post URL (e.g. `my-post`).')

                  post_path = f'shiny-hoppy-meeple/content/posts/{slug}.md'
                  if not os.path.exists(post_path):
                      comment(issue_number, f'No post found with slug `{slug}`.')
                      print(f'::error::Post not found: {post_path}')
                      sys.exit(1)

                  with open(post_path) as f:
                      lines = f.readlines()

                  if not lines or lines[0].strip() != '+++':
                      print('::error::Post has no TOML front matter')
                      sys.exit(1)

                  try:
                      fm_end = next(i for i, l in enumerate(lines[1:], 1) if l.strip() == '+++')
                  except StopIteration:
                      print('::error::Malformed front matter')
                      sys.exit(1)

                  fm_lines = lines[1:fm_end]
                  body_lines = lines[fm_end + 1:]

                  has_publish_date = any(l.startswith('publishDate =') for l in fm_lines)
                  has_unlisted = any(l.startswith('unlisted =') for l in fm_lines)

                  if not has_publish_date and not has_unlisted:
                      comment(issue_number, f'Post `{slug}` is already fully public — no scheduled date or unlisted flag found.')
                      sys.exit(1)

                  new_fm = [l for l in fm_lines
                            if not l.startswith('publishDate =') and not l.startswith('unlisted =')]

                  with open(post_path, 'w') as f:
                      f.write('+++\n')
                      f.writelines(new_fm)
                      f.write('+++\n')
                      f.writelines(body_lines)

                  set_output('slug', slug)
                  set_output('post_path', post_path)
                  PYEOF

            - name: Create branch and open PR
              env:
                  GH_TOKEN: ${{ github.token }}
                  SLUG: ${{ steps.post.outputs.slug }}
                  POST_PATH: ${{ steps.post.outputs.post_path }}
                  ISSUE_NUMBER: ${{ github.event.issue.number }}
              run: |
                  BRANCH="publish-now/${SLUG}"
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git checkout -b "$BRANCH"
                  git add "$POST_PATH"
                  git commit -m "Publish now: ${SLUG} (#${ISSUE_NUMBER})"
                  git push origin "$BRANCH"
                  gh pr create \
                    --title "Publish now: ${SLUG}" \
                    --body "Closes #${ISSUE_NUMBER}" \
                    --base main \
                    --head "$BRANCH"
