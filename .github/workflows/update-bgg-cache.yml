name: Update BGG cache

on:
    schedule:
        - cron: "0 4 * * *"
    workflow_dispatch:

jobs:
    update-cache:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            deployments: write
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  submodules: true

            - name: Set up Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: "20"
                  cache: "npm"

            - name: Install Node dependencies
              run: npm ci

            - name: Sync definitions from Google Sheets
              env:
                  GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
                  GOOGLE_SHEETS_SPREADSHEET_ID: ${{ secrets.GOOGLE_SHEETS_SPREADSHEET_ID }}
              run: node shiny-hoppy-meeple/sheets-sync.js

            - name: Remove stale caches
              run: node .github/scripts/cleanup-stale-cache.js

            - name: Export libraries
              env:
                  BGG_API_TOKEN: ${{ secrets.BGG_API_TOKEN }}
              run: |
                  for f in shiny-hoppy-meeple/data/definitions/libraries/*.json; do
                    slug=$(basename "$f" .json)
                    echo "--- library: $slug"
                    node bgg_export.js --library "$slug" \
                      || echo "::warning::Export failed for library '$slug'"
                  done

            - name: Export members
              env:
                  BGG_API_TOKEN: ${{ secrets.BGG_API_TOKEN }}
              run: node .github/scripts/bgg-export-members.js

            - name: Regenerate QR-code PDF if main library changed
              run: |
                  if git diff --quiet -- shiny-hoppy-meeple/data/bgg-cache/collections/main-library.json; then
                    echo "main-library.json unchanged — skipping QR-code PDF."
                  else
                    echo "main-library.json changed — regenerating QR-code PDF."
                    node qr-pdf/generate_qr_pdf.js
                  fi

            - name: Commit and push changes
              id: commit
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add shiny-hoppy-meeple/data/bgg-cache/ shiny-hoppy-meeple/static/images/games/ shiny-hoppy-meeple/static/qr-codes.pdf
                  if git diff --cached --quiet; then
                    echo "No BGG cache changes to commit."
                    echo "changed=false" >> "$GITHUB_OUTPUT"
                  else
                    git commit -m "chore: update BGG cache"
                    git push
                    echo "changed=true" >> "$GITHUB_OUTPUT"
                  fi

            - name: Sync Google Calendar
              if: steps.commit.outputs.changed == 'true'
              env:
                  GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
                  GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
              run: node shiny-hoppy-meeple/calendar-sync.js

            - name: Setup Hugo
              if: steps.commit.outputs.changed == 'true'
              uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78 # v3.2.1
              with:
                  hugo-version: "0.163.1"
                  extended: true

            - name: Build for prod
              if: steps.commit.outputs.changed == 'true'
              run: pushd shiny-hoppy-meeple && hugo --minify && popd

            - name: Deploy to prod
              if: steps.commit.outputs.changed == 'true'
              uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
              with:
                  apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  workingDirectory: shiny-hoppy-meeple
                  command: pages deploy --commit-hash=${{ github.sha }}

            - name: Build for stage
              if: steps.commit.outputs.changed == 'true'
              run: |
                  cp shiny-hoppy-meeple/wrangler-stage.toml shiny-hoppy-meeple/wrangler.toml
                  pushd shiny-hoppy-meeple && hugo --minify --buildFuture --baseURL "https://stage-shiny-hoppy-meeple.pages.dev/" && popd

            - name: Deploy to stage
              if: steps.commit.outputs.changed == 'true'
              uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
              with:
                  apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  workingDirectory: shiny-hoppy-meeple
                  command: pages deploy --commit-hash=${{ github.sha }}
