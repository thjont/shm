name: Update BGG cache

on:
    schedule:
        - cron: "0 4 * * *"
    workflow_dispatch:

jobs:
    update-cache:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            deployments: write
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  submodules: true

            - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
              with:
                  python-version: "3.12"
                  cache: pip

            - name: Install Python dependencies
              run: pip install -r requirements.txt

            - name: Set up Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: "20"
                  cache: "npm"

            - name: Install Node dependencies
              run: npm ci

            - name: Sync definitions from Google Sheets
              env:
                  GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
                  GOOGLE_SHEETS_SPREADSHEET_ID: ${{ secrets.GOOGLE_SHEETS_SPREADSHEET_ID }}
              run: node shiny-hoppy-meeple/sheets-sync.js

            - name: Remove stale collection caches
              run: |
                  python3 - <<'PYEOF'
                  import json
                  from pathlib import Path

                  data_dir = Path('shiny-hoppy-meeple/data')
                  collections_dir = data_dir / 'bgg-cache' / 'collections'

                  valid_slugs = {'main-library'}
                  for f in (data_dir / 'definitions' / 'members').glob('*.json'):
                      valid_slugs.add(f.stem)
                  for f in (data_dir / 'definitions' / 'libraries').glob('*.json'):
                      valid_slugs.add(f.stem)

                  if collections_dir.exists():
                      for cache_file in sorted(collections_dir.glob('*.json')):
                          if cache_file.stem not in valid_slugs:
                              print(f'Removing stale collection: {cache_file.name}', flush=True)
                              cache_file.unlink()
                  PYEOF

            - name: Export libraries
              env:
                  BGG_API_TOKEN: ${{ secrets.BGG_API_TOKEN }}
              run: |
                  python3 - <<'PYEOF'
                  import json, os, subprocess, sys
                  from pathlib import Path

                  data_dir = Path('shiny-hoppy-meeple/data')
                  for def_file in sorted((data_dir / 'definitions' / 'libraries').glob('*.json')):
                      slug = def_file.stem
                      print(f'--- library: {slug}', flush=True)
                      r = subprocess.run([sys.executable, 'bgg_export.py', '--library', slug], check=False)
                      if r.returncode:
                          print(f'::warning::Export failed for library {slug!r}', file=sys.stderr)
                  PYEOF

            - name: Export members
              env:
                  BGG_API_TOKEN: ${{ secrets.BGG_API_TOKEN }}
              run: |
                  python3 - <<'PYEOF'
                  import json, os, subprocess, sys
                  from pathlib import Path

                  data_dir = Path('shiny-hoppy-meeple/data')
                  for def_file in sorted((data_dir / 'definitions' / 'members').glob('*.json')):
                      defn = json.loads(def_file.read_text())
                      slug = defn.get('slug') or def_file.stem
                      out = str(data_dir / 'bgg-cache' / 'collections' / f'{slug}.json')
                      env = dict(os.environ)
                      if 'geeklist' in defn:
                          cmd = [sys.executable, 'bgg_export.py',
                                 '--geeklist', str(defn['geeklist']),
                                 '--collection-file', out]
                      elif 'username' in defn:
                          env['BGG_USERNAME'] = defn['username']
                          cmd = [sys.executable, 'bgg_export.py', '--collection-file', out]
                      else:
                          print(f'::warning::No geeklist or username in {def_file}', file=sys.stderr)
                          continue
                      print(f'--- member: {slug}', flush=True)
                      r = subprocess.run(cmd, env=env, check=False)
                      if r.returncode:
                          print(f'::warning::Export failed for member {slug!r}', file=sys.stderr)
                  PYEOF

            - name: Remove stale game caches
              run: |
                  python3 - <<'PYEOF'
                  import json
                  from pathlib import Path

                  data_dir = Path('shiny-hoppy-meeple/data')
                  games_dir = data_dir / 'bgg-cache' / 'games'
                  images_dir = Path('shiny-hoppy-meeple/static/images/games')

                  referenced_ids = set()
                  collections_dir = data_dir / 'bgg-cache' / 'collections'
                  if collections_dir.exists():
                      for col_file in collections_dir.glob('*.json'):
                          try:
                              data = json.loads(col_file.read_text())
                              for item in data.get('items', []):
                                  if 'id' in item:
                                      referenced_ids.add(str(item['id']))
                          except Exception as e:
                              print(f'::warning::Could not parse {col_file.name}: {e}', flush=True)

                  if games_dir.exists():
                      for game_file in sorted(games_dir.glob('*.json')):
                          if game_file.stem not in referenced_ids:
                              print(f'Removing stale game: {game_file.name}', flush=True)
                              game_file.unlink()

                  if images_dir.exists():
                      for img_file in sorted(images_dir.iterdir()):
                          game_id = img_file.stem.split('-')[0]
                          if game_id not in referenced_ids:
                              print(f'Removing stale image: {img_file.name}', flush=True)
                              img_file.unlink()
                  PYEOF

            - name: Regenerate QR-code PDF if main library changed
              run: |
                  if git diff --quiet -- shiny-hoppy-meeple/data/bgg-cache/collections/main-library.json; then
                    echo "main-library.json unchanged — skipping QR-code PDF."
                  else
                    echo "main-library.json changed — regenerating QR-code PDF."
                    pip install -r qr-pdf/requirements.txt
                    python3 qr-pdf/generate_qr_pdf.py
                  fi

            - name: Commit and push changes
              id: commit
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add shiny-hoppy-meeple/data/bgg-cache/ shiny-hoppy-meeple/static/images/games/ shiny-hoppy-meeple/static/qr-codes.pdf
                  if git diff --cached --quiet; then
                    echo "No BGG cache changes to commit."
                    echo "changed=false" >> "$GITHUB_OUTPUT"
                  else
                    git commit -m "chore: update BGG cache"
                    git push
                    echo "changed=true" >> "$GITHUB_OUTPUT"
                  fi

            - name: Sync Google Calendar
              if: steps.commit.outputs.changed == 'true'
              env:
                  GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
                  GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
              run: node shiny-hoppy-meeple/calendar-sync.js

            - name: Setup Hugo
              if: steps.commit.outputs.changed == 'true'
              uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78 # v3.2.1
              with:
                  hugo-version: "0.163.1"
                  extended: true

            - name: Build for prod
              if: steps.commit.outputs.changed == 'true'
              run: pushd shiny-hoppy-meeple && hugo --minify && popd

            - name: Deploy to prod
              if: steps.commit.outputs.changed == 'true'
              uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
              with:
                  apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  workingDirectory: shiny-hoppy-meeple
                  command: pages deploy --commit-hash=${{ github.sha }}

            - name: Build for stage
              if: steps.commit.outputs.changed == 'true'
              run: |
                  cp shiny-hoppy-meeple/wrangler-stage.toml shiny-hoppy-meeple/wrangler.toml
                  pushd shiny-hoppy-meeple && hugo --minify --buildFuture --baseURL "https://stage-shiny-hoppy-meeple.pages.dev/" && popd

            - name: Deploy to stage
              if: steps.commit.outputs.changed == 'true'
              uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
              with:
                  apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  workingDirectory: shiny-hoppy-meeple
                  command: pages deploy --commit-hash=${{ github.sha }}
