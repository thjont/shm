name: Publish post from issue

on:
    issues:
        types: [labeled, edited]

jobs:
    publish:
        if: |
            (github.event.action == 'labeled' && github.event.label.name == 'publish') ||
            (github.event.action == 'edited' && contains(github.event.issue.labels.*.name, 'publish'))
        runs-on: ubuntu-latest
        permissions:
            contents: write
            issues: write
            pull-requests: write
        steps:
            - name: Check publisher permission
              env:
                  GH_TOKEN: ${{ github.token }}
                  SENDER: ${{ github.event.sender.login }}
                  ISSUE_NUMBER: ${{ github.event.issue.number }}
                  REPO: ${{ github.repository }}
              run: |
                  PERMISSION=$(gh api "repos/${REPO}/collaborators/${SENDER}/permission" --jq '.permission' 2>/dev/null || echo "none")
                  if [[ "$PERMISSION" != "admin" && "$PERMISSION" != "write" ]]; then
                    gh issue comment "$ISSUE_NUMBER" --body "@${SENDER} Only maintainers with write access can publish posts. The publish label has been removed."
                    gh issue edit "$ISSUE_NUMBER" --remove-label "publish"
                    echo "Blocked: ${SENDER} has permission '${PERMISSION}'"
                    exit 1
                  fi

            - uses: actions/checkout@v4
              with:
                  submodules: true

            - name: Create or update post from issue
              env:
                  ISSUE_TITLE: ${{ github.event.issue.title }}
                  ISSUE_BODY: ${{ github.event.issue.body }}
                  ISSUE_NUMBER: ${{ github.event.issue.number }}
                  EVENT_ACTION: ${{ github.event.action }}
                  GH_TOKEN: ${{ github.token }}
              run: |
                  SLUG=$(echo "$ISSUE_TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/-\+/-/g' | sed 's/^-\|-$//g')
                  BRANCH="post/${SLUG}"
                  DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
                  FILE="shiny-hoppy-meeple/content/posts/${SLUG}.md"
                  PROCESSED_BODY="$ISSUE_BODY"

                  # Download any GitHub-hosted images and rewrite URLs to local paths
                  IMG_DIR="shiny-hoppy-meeple/static/images/posts/${SLUG}"
                  URLS=$(echo "$ISSUE_BODY" | grep -oE 'https://github\.com/user-attachments/assets/[a-f0-9-]+' | sort -u)
                  if [ -n "$URLS" ]; then
                    mkdir -p "$IMG_DIR"
                    IMG_COUNT=0
                    while IFS= read -r url; do
                      [ -z "$url" ] && continue
                      IMG_COUNT=$((IMG_COUNT + 1))
                      TMPFILE=$(mktemp)
                      curl -fsSL -H "Authorization: token $GH_TOKEN" -o "$TMPFILE" "$url"
                      MIME=$(file --mime-type -b "$TMPFILE")
                      case "$MIME" in
                        image/jpeg) EXT="jpg" ;;
                        image/png)  EXT="png" ;;
                        image/gif)  EXT="gif" ;;
                        image/webp) EXT="webp" ;;
                        image/svg+xml) EXT="svg" ;;
                        *) EXT="jpg" ;;
                      esac
                      FILENAME="${SLUG}-${IMG_COUNT}.${EXT}"
                      mv "$TMPFILE" "${IMG_DIR}/${FILENAME}"
                      PROCESSED_BODY="${PROCESSED_BODY//$url//images/posts/${SLUG}/${FILENAME}}"
                      PROCESSED_BODY=$(echo "$PROCESSED_BODY" | sed 's/ width="[^"]*"//g; s/ height="[^"]*"//g')
                    done <<< "$URLS"
                  fi

                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

                  if [[ "$EVENT_ACTION" == "labeled" ]]; then
                    git checkout -b "$BRANCH"
                  else
                    git fetch origin "$BRANCH"
                    git checkout "$BRANCH"
                  fi

                  {
                    printf '+++\n'
                    printf 'date = "%s"\n' "$DATE"
                    printf 'draft = false\n'
                    printf 'title = "%s"\n' "$ISSUE_TITLE"
                    printf '+++\n\n'
                    printf '%s\n' "$PROCESSED_BODY"
                  } > "$FILE"

                  git add "$FILE" shiny-hoppy-meeple/static/images/
                  if [[ "$EVENT_ACTION" == "labeled" ]]; then
                    git commit -m "Post: $ISSUE_TITLE (closes #$ISSUE_NUMBER)"
                    git push origin "$BRANCH"
                  else
                    git commit -m "Update post: $ISSUE_TITLE"
                    git push --force-with-lease origin "$BRANCH"
                  fi

                  PREVIEW_BASEURL="https://$(echo "$BRANCH" | sed 's/\//-/g').shiny-hoppy-meeple.pages.dev/"
                  echo "BRANCH=${BRANCH}" >> "$GITHUB_ENV"
                  echo "ISSUE_TITLE=${ISSUE_TITLE}" >> "$GITHUB_ENV"
                  echo "ISSUE_NUMBER=${ISSUE_NUMBER}" >> "$GITHUB_ENV"
                  echo "PREVIEW_BASEURL=${PREVIEW_BASEURL}" >> "$GITHUB_ENV"

            - name: Setup Hugo
              uses: peaceiris/actions-hugo@v3
              with:
                  hugo-version: "latest"
                  extended: true

            - name: Build site
              run: pushd shiny-hoppy-meeple && hugo --minify --baseURL "${{ env.PREVIEW_BASEURL }}" && popd

            - name: Deploy preview to Cloudflare Pages
              id: deploy
              uses: cloudflare/wrangler-action@v3
              with:
                  apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  command: pages deploy shiny-hoppy-meeple/public --project-name=shiny-hoppy-meeple --branch=${{ env.BRANCH }} --commit-hash=${{ github.sha }}

            - name: Open PR
              if: github.event.action == 'labeled'
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  gh pr create \
                    --title "${{ env.ISSUE_TITLE }}" \
                    --body "Closes #${{ env.ISSUE_NUMBER }}

                  Preview: ${{ steps.deploy.outputs.deployment-url }}" \
                    --base main \
                    --head "${{ env.BRANCH }}"
