name: Publish post from issue

on:
    issues:
        types: [labeled]

jobs:
    publish:
        if: github.event.label.name == 'publish'
        runs-on: ubuntu-latest
        permissions:
            contents: write
            issues: read
        steps:
            - uses: actions/checkout@v4
              with:
                  submodules: true

            - name: Create post from issue
              env:
                  ISSUE_TITLE: ${{ github.event.issue.title }}
                  ISSUE_BODY: ${{ github.event.issue.body }}
                  ISSUE_NUMBER: ${{ github.event.issue.number }}
              run: |
                  SLUG=$(echo "$ISSUE_TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/-\+/-/g' | sed 's/^-\|-$//g')
                  DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
                  FILE="shiny-hoppy-meeple/content/posts/${SLUG}.md"
                  {
                    printf '+++\n'
                    printf 'date = "%s"\n' "$DATE"
                    printf 'draft = false\n'
                    printf 'title = "%s"\n' "$ISSUE_TITLE"
                    printf '+++\n\n'
                    printf '%s\n' "$ISSUE_BODY"
                  } > "$FILE"
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add "$FILE"
                  git commit -m "Post: $ISSUE_TITLE (closes #$ISSUE_NUMBER)"
                  git push
