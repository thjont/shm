name: Publish post from issue

on:
    issues:
        types: [labeled, edited]

jobs:
    publish:
        if: |
            (github.event.action == 'labeled' && github.event.label.name == 'publish' && contains(github.event.issue.labels.*.name, 'new-post')) ||
            (github.event.action == 'edited' && contains(github.event.issue.labels.*.name, 'publish') && contains(github.event.issue.labels.*.name, 'new-post'))
        runs-on: ubuntu-latest
        permissions:
            contents: write
            issues: write
            pull-requests: write
        steps:
            - name: Check publisher permission
              env:
                  GH_TOKEN: ${{ github.token }}
                  SENDER: ${{ github.event.sender.login }}
                  ISSUE_NUMBER: ${{ github.event.issue.number }}
                  REPO: ${{ github.repository }}
              run: |
                  PERMISSION=$(gh api "repos/${REPO}/collaborators/${SENDER}/permission" --jq '.permission' 2>/dev/null || echo "none")
                  if [[ "$PERMISSION" != "admin" && "$PERMISSION" != "write" ]]; then
                    gh issue comment "$ISSUE_NUMBER" --body "@${SENDER} Only maintainers with write access can publish posts. The publish label has been removed."
                    gh issue edit "$ISSUE_NUMBER" --remove-label "publish"
                    echo "Blocked: ${SENDER} has permission '${PERMISSION}'"
                    exit 1
                  fi

            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
              with:
                  submodules: true

            - name: Create or update post from issue
              env:
                  ISSUE_TITLE: ${{ github.event.issue.title }}
                  ISSUE_BODY: ${{ github.event.issue.body }}
                  ISSUE_NUMBER: ${{ github.event.issue.number }}
                  LABELS: ${{ toJSON(github.event.issue.labels) }}
                  EVENT_ACTION: ${{ github.event.action }}
                  GH_TOKEN: ${{ github.token }}
              run: |
                  SLUG=$(echo "$ISSUE_TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/-\+/-/g' | sed 's/^-\|-$//g')
                  if ! [[ "$SLUG" =~ ^[a-z0-9][a-z0-9-]*$ ]]; then
                    gh issue comment "$ISSUE_NUMBER" --body "Could not derive a valid post slug from the title \`${ISSUE_TITLE}\`. Use a title with at least one letter or number."
                    echo "::error::Invalid title-derived slug: '${SLUG}'"
                    exit 1
                  fi
                  BRANCH="post/${SLUG}"
                  DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
                  FILE="shiny-hoppy-meeple/content/posts/${SLUG}.md"
                  TAGS_TOML=$(echo "$LABELS" | jq -r '[.[] | select(.name | startswith("tag/")) | .name[4:]] | @json')
                  PROCESSED_BODY=$(python3 -c "import re, os; body = os.environ.get('ISSUE_BODY', ''); m = re.search(r'### Content\n\n(.*?)(?:\n### |\Z)', body, re.DOTALL); print(m.group(1).rstrip() if m else body)")
                  PUBLISH_DATE=$(python3 - <<'PYEOF'
                  import re, os, datetime
                  body = os.environ.get('ISSUE_BODY', '').replace('\r\n', '\n')
                  m = re.search(r'### Publish date[^\n]*\n\n(.+?)(?:\n### |\Z)', body, re.DOTALL)
                  val = m.group(1).strip() if m else ''
                  if val and val != '_No response_':
                      try:
                          dt = datetime.datetime.strptime(val, '%Y-%m-%d %H:%M').replace(tzinfo=datetime.timezone.utc)
                          print(dt.strftime('%Y-%m-%dT%H:%M:%SZ'))
                      except Exception:
                          pass
                  PYEOF
                  )

                  # Download any GitHub-hosted images and rewrite URLs to local paths
                  IMG_DIR="shiny-hoppy-meeple/static/images/posts/${SLUG}"
                  URLS=$(echo "$ISSUE_BODY" | grep -oE 'https://github\.com/user-attachments/assets/[a-f0-9-]+' | sort -u)
                  if [ -n "$URLS" ]; then
                    mkdir -p "$IMG_DIR"
                    IMG_COUNT=0
                    while IFS= read -r url; do
                      [ -z "$url" ] && continue
                      IMG_COUNT=$((IMG_COUNT + 1))
                      TMPFILE=$(mktemp)
                      # user-attachments are publicly fetchable by URL, so no auth
                      # token is sent — avoids leaking it on any cross-host redirect.
                      curl -fsSL --proto '=https' -o "$TMPFILE" "$url"
                      MIME=$(file --mime-type -b "$TMPFILE")
                      case "$MIME" in
                        image/jpeg) EXT="jpg" ;;
                        image/png)  EXT="png" ;;
                        image/gif)  EXT="gif" ;;
                        image/webp) EXT="webp" ;;
                        image/svg+xml) EXT="svg" ;;
                        *) EXT="jpg" ;;
                      esac
                      FILENAME="${SLUG}-${IMG_COUNT}.${EXT}"
                      mv "$TMPFILE" "${IMG_DIR}/${FILENAME}"
                      PROCESSED_BODY="${PROCESSED_BODY//$url//images/posts/${SLUG}/${FILENAME}}"
                      PROCESSED_BODY=$(echo "$PROCESSED_BODY" | sed 's/ width="[^"]*"//g; s/ height="[^"]*"//g')
                    done <<< "$URLS"
                  fi

                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

                  if [[ "$EVENT_ACTION" == "labeled" ]]; then
                    git checkout -b "$BRANCH"
                  else
                    git fetch origin "$BRANCH"
                    git checkout "$BRANCH"
                  fi

                  {
                    printf '+++\n'
                    printf 'date = "%s"\n' "$DATE"
                    [ -n "$PUBLISH_DATE" ] && printf 'publishDate = "%s"\n' "$PUBLISH_DATE"
                    printf 'draft = false\n'
                    printf 'title = "%s"\n' "$ISSUE_TITLE"
                    [ "$TAGS_TOML" != "[]" ] && printf 'tags = %s\n' "$TAGS_TOML"
                    printf '+++\n\n'
                    printf '%s\n' "$PROCESSED_BODY"
                  } > "$FILE"

                  git add "$FILE" shiny-hoppy-meeple/static/images/
                  if [[ "$EVENT_ACTION" == "labeled" ]]; then
                    git commit -m "Post: $ISSUE_TITLE (#$ISSUE_NUMBER)"
                    git push origin "$BRANCH"
                  else
                    git commit -m "Update post: $ISSUE_TITLE"
                    git push --force-with-lease origin "$BRANCH"
                  fi

                  PREVIEW_BASEURL="https://dev-shiny-hoppy-meeple.pages.dev/"
                  echo "BRANCH=${BRANCH}" >> "$GITHUB_ENV"
                  echo "ISSUE_TITLE=$(echo "$ISSUE_TITLE" | tr -d '\n\r')" >> "$GITHUB_ENV"
                  echo "ISSUE_NUMBER=${ISSUE_NUMBER}" >> "$GITHUB_ENV"
                  echo "PREVIEW_BASEURL=${PREVIEW_BASEURL}" >> "$GITHUB_ENV"

            - name: Setup Hugo
              uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78 # v3.2.1
              with:
                  hugo-version: "0.163.1"
                  extended: true

            - name: Build site
              run: pushd shiny-hoppy-meeple && hugo --minify --buildFuture --baseURL "$PREVIEW_BASEURL" && popd

            - name: Deploy preview to Cloudflare Pages
              id: deploy
              uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
              with:
                  apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  command: pages deploy shiny-hoppy-meeple/public --project-name=dev-shiny-hoppy-meeple --commit-hash=${{ github.sha }}

            - name: Post preview URL to issue
              env:
                  GH_TOKEN: ${{ github.token }}
                  DEPLOY_URL: ${{ steps.deploy.outputs.deployment-url }}
              run: |
                  gh issue comment "$ISSUE_NUMBER" --body "Preview: ${DEPLOY_URL}"

            - name: Open PR
              if: github.event.action == 'labeled'
              env:
                  GH_TOKEN: ${{ github.token }}
                  DEPLOY_URL: ${{ steps.deploy.outputs.deployment-url }}
              run: |
                  gh pr create \
                    --title "$ISSUE_TITLE" \
                    --body "Closes #${ISSUE_NUMBER}

                  Preview: ${DEPLOY_URL}" \
                    --base main \
                    --head "$BRANCH"

            - name: Post preview URL to PR
              if: github.event.action == 'edited'
              env:
                  GH_TOKEN: ${{ github.token }}
                  DEPLOY_URL: ${{ steps.deploy.outputs.deployment-url }}
              run: |
                  PR_NUMBER=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number')
                  gh pr comment "$PR_NUMBER" --body "Preview updated: ${DEPLOY_URL}"
