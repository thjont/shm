name: Delete post from issue

on:
    issues:
        types: [labeled]

jobs:
    delete-post:
        if: github.event.label.name == 'publish' && contains(github.event.issue.labels.*.name, 'delete-post')
        runs-on: ubuntu-latest
        permissions:
            contents: write
            issues: write
            pull-requests: write
        steps:
            - name: Check permission
              env:
                  GH_TOKEN: ${{ github.token }}
                  SENDER: ${{ github.event.sender.login }}
                  ISSUE_NUMBER: ${{ github.event.issue.number }}
                  REPO: ${{ github.repository }}
              run: |
                  PERMISSION=$(gh api "repos/${REPO}/collaborators/${SENDER}/permission" --jq '.permission' 2>/dev/null || echo "none")
                  if [[ "$PERMISSION" != "admin" && "$PERMISSION" != "write" ]]; then
                    gh issue comment "$ISSUE_NUMBER" --body "@${SENDER} Only maintainers with write access can delete posts."
                    gh issue close "$ISSUE_NUMBER"
                    exit 1
                  fi

            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

            - name: Validate and remove post files
              id: post
              env:
                  ISSUE_BODY: ${{ github.event.issue.body }}
                  ISSUE_NUMBER: ${{ github.event.issue.number }}
                  GH_TOKEN: ${{ github.token }}
              run: |
                  python3 - <<'PYEOF'
                  import os, re, subprocess, sys

                  body = os.environ['ISSUE_BODY']
                  issue_number = os.environ['ISSUE_NUMBER']

                  def extract(label):
                      m = re.search(rf'### {re.escape(label)}\n\n(.*?)(?=\n### |\Z)', body, re.DOTALL)
                      if not m:
                          return ''
                      v = m.group(1).strip()
                      return '' if v == '_No response_' else v

                  slug = extract('Post Slug').strip()

                  if not re.match(r'^[a-z0-9][a-z0-9-]*$', slug):
                      print(f'::error::Invalid slug: {slug!r}')
                      subprocess.run(['gh', 'issue', 'comment', issue_number, '--body', f'Invalid slug: `{slug}`.'], check=True)
                      sys.exit(1)

                  post_path = f'shiny-hoppy-meeple/content/posts/{slug}.md'
                  if not os.path.exists(post_path):
                      print(f'::error::No post found with slug: {slug!r}')
                      subprocess.run(['gh', 'issue', 'comment', issue_number, '--body', f'No post found with slug `{slug}`.'], check=True)
                      sys.exit(1)

                  os.remove(post_path)

                  image_dir = f'shiny-hoppy-meeple/static/images/posts/{slug}'
                  image_dir_exists = os.path.isdir(image_dir)

                  with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
                      out.write(f'slug={slug}\n')
                      out.write(f'post_path={post_path}\n')
                      out.write(f'image_dir={image_dir}\n')
                      out.write(f'image_dir_exists={"true" if image_dir_exists else "false"}\n')
                  PYEOF

            - name: Create branch and open PR
              env:
                  GH_TOKEN: ${{ github.token }}
                  SLUG: ${{ steps.post.outputs.slug }}
                  POST_PATH: ${{ steps.post.outputs.post_path }}
                  IMAGE_DIR: ${{ steps.post.outputs.image_dir }}
                  IMAGE_DIR_EXISTS: ${{ steps.post.outputs.image_dir_exists }}
                  ISSUE_NUMBER: ${{ github.event.issue.number }}
              run: |
                  BRANCH="delete-post/${SLUG}"
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git checkout -b "$BRANCH"
                  git rm "$POST_PATH"
                  [ "$IMAGE_DIR_EXISTS" = "true" ] && git rm -r "$IMAGE_DIR"
                  git commit -m "Remove post ${SLUG} (#${ISSUE_NUMBER})"
                  git push origin "$BRANCH"
                  gh pr create \
                    --title "Delete post: ${SLUG}" \
                    --body "Closes #${ISSUE_NUMBER}" \
                    --base main \
                    --head "$BRANCH"
