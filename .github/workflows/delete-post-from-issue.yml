name: Delete post from issue

on:
    issues:
        types: [labeled]

jobs:
    delete-post:
        if: github.event.label.name == 'publish' && contains(github.event.issue.labels.*.name, 'delete-post')
        runs-on: ubuntu-latest
        permissions:
            contents: write
            issues: write
            pull-requests: write
        steps:
            - name: Check permission
              uses: ./.github/actions/check-permission
              with:
                  token: ${{ github.token }}
                  sender: ${{ github.event.sender.login }}
                  issue-number: ${{ github.event.issue.number }}
                  repo: ${{ github.repository }}
                  error-message: Only maintainers with write access can delete posts.

            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

            - name: Validate and remove post files
              id: post
              env:
                  ISSUE_BODY: ${{ github.event.issue.body }}
                  ISSUE_NUMBER: ${{ github.event.issue.number }}
                  GH_TOKEN: ${{ github.token }}
              run: |
                  python3 - <<'PYEOF'
                  import os, sys
                  sys.path.insert(0, '.github/scripts')
                  from issue_helpers import extract, comment, set_output, validate_slug

                  issue_number = os.environ['ISSUE_NUMBER']

                  slug = extract('Post Slug').strip()

                  validate_slug(issue_number, slug)

                  post_path = f'shiny-hoppy-meeple/content/posts/{slug}.md'
                  if not os.path.exists(post_path):
                      print(f'::error::No post found with slug: {slug!r}')
                      comment(issue_number, f'No post found with slug `{slug}`.')
                      sys.exit(1)

                  os.remove(post_path)

                  image_dir = f'shiny-hoppy-meeple/static/images/posts/{slug}'
                  image_dir_exists = os.path.isdir(image_dir)

                  set_output('slug', slug)
                  set_output('post_path', post_path)
                  set_output('image_dir', image_dir)
                  set_output('image_dir_exists', 'true' if image_dir_exists else 'false')
                  PYEOF

            - name: Create branch and open PR
              env:
                  GH_TOKEN: ${{ github.token }}
                  SLUG: ${{ steps.post.outputs.slug }}
                  POST_PATH: ${{ steps.post.outputs.post_path }}
                  IMAGE_DIR: ${{ steps.post.outputs.image_dir }}
                  IMAGE_DIR_EXISTS: ${{ steps.post.outputs.image_dir_exists }}
                  ISSUE_NUMBER: ${{ github.event.issue.number }}
              run: |
                  BRANCH="delete-post/${SLUG}"
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git checkout -b "$BRANCH"
                  git rm "$POST_PATH"
                  [ "$IMAGE_DIR_EXISTS" = "true" ] && git rm -r "$IMAGE_DIR"
                  git commit -m "Remove post ${SLUG} (#${ISSUE_NUMBER})"
                  git push origin "$BRANCH"
                  gh pr create \
                    --title "Delete post: ${SLUG}" \
                    --body "Closes #${ISSUE_NUMBER}" \
                    --base main \
                    --head "$BRANCH"
