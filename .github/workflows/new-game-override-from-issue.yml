name: New game override from issue

on:
    issues:
        types: [labeled]

jobs:
    create-override:
        if: github.event.label.name == 'publish' && contains(github.event.issue.labels.*.name, 'new-game-override')
        runs-on: ubuntu-latest
        permissions:
            contents: write
            issues: write
            pull-requests: write
        steps:
            - name: Check permission
              env:
                  GH_TOKEN: ${{ github.token }}
                  SENDER: ${{ github.event.sender.login }}
                  ISSUE_NUMBER: ${{ github.event.issue.number }}
                  REPO: ${{ github.repository }}
              run: |
                  PERMISSION=$(gh api "repos/${REPO}/collaborators/${SENDER}/permission" --jq '.permission' 2>/dev/null || echo "none")
                  if [[ "$PERMISSION" != "admin" && "$PERMISSION" != "write" ]]; then
                    gh issue comment "$ISSUE_NUMBER" --body "@${SENDER} Only maintainers with write access can create game overrides."
                    gh issue close "$ISSUE_NUMBER"
                    exit 1
                  fi

            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

            - name: Parse issue and write override file
              id: override
              env:
                  ISSUE_BODY: ${{ github.event.issue.body }}
                  ISSUE_NUMBER: ${{ github.event.issue.number }}
                  GH_TOKEN: ${{ github.token }}
              run: |
                  python3 - <<'PYEOF'
                  import json, os, re, subprocess, sys

                  body = os.environ['ISSUE_BODY']
                  issue_number = os.environ['ISSUE_NUMBER']

                  def extract(label):
                      m = re.search(rf'### {re.escape(label)}\n\n(.*?)(?=\n### |\Z)', body, re.DOTALL)
                      if not m:
                          return ''
                      v = m.group(1).strip()
                      return '' if v == '_No response_' else v

                  bgg_id    = extract('BGG Game ID').strip()
                  desc      = extract('Description')
                  video     = extract('Learn to Play Video ID').strip()

                  if not bgg_id.isdigit():
                      print(f'::error::Invalid BGG Game ID: {bgg_id!r}')
                      subprocess.run(['gh', 'issue', 'comment', issue_number, '--body', f'Invalid BGG Game ID: `{bgg_id}`. Must be a number.'], check=True)
                      sys.exit(1)

                  if not desc and not video:
                      print('::error::No fields provided — nothing to override.')
                      subprocess.run(['gh', 'issue', 'comment', issue_number, '--body', 'No fields were provided. Please supply a Description, a Learn to Play Video ID, or both.'], check=True)
                      sys.exit(1)

                  path = f'shiny-hoppy-meeple/data/definitions/games-bgg-override/{bgg_id}.json'
                  data = {}
                  if os.path.exists(path):
                      with open(path) as f:
                          data = json.load(f)

                  if desc:
                      data['description'] = desc
                  if video:
                      data['learn_to_play_video'] = video

                  with open(path, 'w') as f:
                      json.dump(data, f, indent=2)
                      f.write('\n')

                  with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
                      out.write(f'bgg_id={bgg_id}\n')
                      out.write(f'path={path}\n')
                  PYEOF

            - name: Create branch and open PR
              env:
                  GH_TOKEN: ${{ github.token }}
                  BGG_ID: ${{ steps.override.outputs.bgg_id }}
                  OVERRIDE_PATH: ${{ steps.override.outputs.path }}
                  ISSUE_NUMBER: ${{ github.event.issue.number }}
              run: |
                  BRANCH="game-override/${BGG_ID}"
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git checkout -b "$BRANCH"
                  git add "$OVERRIDE_PATH"
                  git commit -m "Add game override for BGG #${BGG_ID} (#${ISSUE_NUMBER})"
                  git push origin "$BRANCH"
                  gh pr create \
                    --title "Game override: BGG #${BGG_ID}" \
                    --body "Closes #${ISSUE_NUMBER}" \
                    --base main \
                    --head "$BRANCH"
