name: Add shadow library from issue

on:
    issues:
        types: [labeled]

jobs:
    add-shadow-library:
        if: github.event.label.name == 'publish' && contains(github.event.issue.labels.*.name, 'new-shadow-library')
        runs-on: ubuntu-latest
        permissions:
            contents: write
            issues: write
            pull-requests: write
        steps:
            - name: Check permission
              env:
                  GH_TOKEN: ${{ github.token }}
                  SENDER: ${{ github.event.sender.login }}
                  ISSUE_NUMBER: ${{ github.event.issue.number }}
                  REPO: ${{ github.repository }}
              run: |
                  PERMISSION=$(gh api "repos/${REPO}/collaborators/${SENDER}/permission" --jq '.permission' 2>/dev/null || echo "none")
                  if [[ "$PERMISSION" != "admin" && "$PERMISSION" != "write" ]]; then
                    gh issue comment "$ISSUE_NUMBER" --body "@${SENDER} Only maintainers with write access can add shadow libraries."
                    gh issue close "$ISSUE_NUMBER"
                    exit 1
                  fi

            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

            - name: Parse issue and write shadow library config
              id: library
              env:
                  ISSUE_BODY: ${{ github.event.issue.body }}
                  ISSUE_NUMBER: ${{ github.event.issue.number }}
                  GH_TOKEN: ${{ github.token }}
              run: |
                  python3 - <<'PYEOF'
                  import json, os, re, subprocess, sys

                  body = os.environ['ISSUE_BODY']
                  issue_number = os.environ['ISSUE_NUMBER']

                  def extract(label):
                      m = re.search(rf'### {re.escape(label)}\n\n(.*?)(?=\n### |\Z)', body, re.DOTALL)
                      if not m:
                          return ''
                      v = m.group(1).strip()
                      return '' if v == '_No response_' else v

                  display_name = extract('Display Name').strip()
                  slug         = extract('Slug').strip()
                  bgg_username = extract('BGG Username').strip()
                  geeklist_id  = extract('BGG GeekList ID').strip()

                  if not re.match(r'^[a-z0-9][a-z0-9-]*$', slug):
                      print(f'::error::Invalid slug: {slug!r}')
                      subprocess.run(['gh', 'issue', 'comment', issue_number, '--body', f'Invalid slug: `{slug}`. Use lowercase letters, numbers, and hyphens only.'], check=True)
                      sys.exit(1)

                  if not bgg_username and not geeklist_id:
                      print('::error::No BGG source provided.')
                      subprocess.run(['gh', 'issue', 'comment', issue_number, '--body', 'Please provide either a BGG Username or a BGG GeekList ID.'], check=True)
                      sys.exit(1)

                  if geeklist_id and not geeklist_id.isdigit():
                      print(f'::error::Invalid GeekList ID: {geeklist_id!r}')
                      subprocess.run(['gh', 'issue', 'comment', issue_number, '--body', f'Invalid GeekList ID: `{geeklist_id}`. Must be a number.'], check=True)
                      sys.exit(1)

                  config_dir = 'shiny-hoppy-meeple/data/sources/shadow-libraries'
                  os.makedirs(config_dir, exist_ok=True)

                  config_path = f'{config_dir}/{slug}.json'
                  if os.path.exists(config_path):
                      print(f'::error::Slug already exists: {slug!r}')
                      subprocess.run(['gh', 'issue', 'comment', issue_number, '--body', f'A shadow library with slug `{slug}` already exists.'], check=True)
                      sys.exit(1)

                  data = {'slug': slug, 'display_name': display_name}
                  if bgg_username:
                      data['collection'] = bgg_username
                  if geeklist_id:
                      data['geeklist'] = int(geeklist_id)

                  with open(config_path, 'w') as f:
                      json.dump(data, f, indent=2)
                      f.write('\n')

                  with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
                      out.write(f'slug={slug}\n')
                      out.write(f'display_name={display_name}\n')
                      out.write(f'config_path={config_path}\n')
                  PYEOF

            - name: Create branch and open PR
              env:
                  GH_TOKEN: ${{ github.token }}
                  SLUG: ${{ steps.library.outputs.slug }}
                  DISPLAY_NAME: ${{ steps.library.outputs.display_name }}
                  CONFIG_PATH: ${{ steps.library.outputs.config_path }}
                  ISSUE_NUMBER: ${{ github.event.issue.number }}
              run: |
                  BRANCH="shadow-library/${SLUG}"
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git checkout -b "$BRANCH"
                  git add "$CONFIG_PATH"
                  git commit -m "Add shadow library ${DISPLAY_NAME} (#${ISSUE_NUMBER})"
                  git push origin "$BRANCH"
                  gh pr create \
                    --title "New shadow library: ${DISPLAY_NAME}" \
                    --body "Closes #${ISSUE_NUMBER}" \
                    --base main \
                    --head "$BRANCH"
