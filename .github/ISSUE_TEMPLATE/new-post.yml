name: New Post
description: Publish a new post to the Shiny Hoppy Meeple site
body:
  - type: markdown
    attributes:
      value: |
        Set the issue title above as your post title. When you're ready to publish, apply the `publish` label.
  - type: textarea
    id: content
    attributes:
      label: Content
      description: "Markdown supported: links, **bold**, headings, lists, and images all work."
    validations:
      required: true
