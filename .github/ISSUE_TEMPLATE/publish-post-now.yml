name: Publish Post Now
description: Make a scheduled or unlisted post fully public immediately
labels: ["publish-post-now"]
body:
    - type: markdown
      attributes:
          value: |
              Removes the scheduled publish date or unlisted restriction from an existing post, making it fully visible immediately. Apply the `publish` label when ready to create the PR.
    - type: input
      id: slug
      attributes:
          label: Post Slug
          description: The post's URL slug (e.g. for /posts/my-post/ use my-post). Find it in the post's URL or filename under content/posts/.
          placeholder: "my-post"
      validations:
          required: true
