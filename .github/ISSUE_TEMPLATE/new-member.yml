name: New Member
description: Add a new member to the site
labels: ["new-member"]
body:
    - type: markdown
      attributes:
          value: |
              Fill in the details below. Apply the `publish` label when ready to create the PR.
    - type: input
      id: display_name
      attributes:
          label: Display Name
          description: The name shown on the site.
          placeholder: "Alice"
      validations:
          required: true
    - type: input
      id: slug
      attributes:
          label: Slug
          description: Used for the member page URL and file name. Lowercase letters, numbers, and hyphens only.
          placeholder: "alice"
      validations:
          required: true
    - type: textarea
      id: description
      attributes:
          label: Description
          description: A short bio for the member.
      validations:
          required: false
    - type: input
      id: bgg_username
      attributes:
          label: BGG Username
          description: Their BoardGameGeek username. Used to import their game collection. Leave blank if using a GeekList instead.
          placeholder: "alice_on_bgg"
      validations:
          required: false
    - type: input
      id: geeklist_id
      attributes:
          label: BGG GeekList ID
          description: Numeric ID of a BGG GeekList to use as their collection. Leave blank if using a BGG username instead.
          placeholder: "12345"
      validations:
          required: false
