name: Delete Member
description: Remove a member from the site
labels: ["delete-member"]
body:
    - type: markdown
      attributes:
          value: |
              This permanently removes the member from the site. Apply the `publish` label when ready to create the PR.
    - type: input
      id: slug
      attributes:
          label: Slug
          description: The member's slug as it appears in their URL (e.g. for /m/alice/ use alice).
          placeholder: "alice"
      validations:
          required: true
