name: New Shadow Library
description: Add a BGG collection or GeekList as a shadow library — generates game pages without a list page
labels: ["new-shadow-library"]
body:
    - type: markdown
      attributes:
          value: |
              Shadow libraries contribute games to the site's game pages without appearing as a browsable list. Apply the `publish` label when ready to create the PR.
    - type: input
      id: display_name
      attributes:
          label: Display Name
          description: A short name for this library (used internally and in PR titles).
          placeholder: "Boundary Taproom"
      validations:
          required: true
    - type: input
      id: slug
      attributes:
          label: Slug
          description: Unique identifier. Lowercase letters, numbers, and hyphens only.
          placeholder: "boundary-taproom"
      validations:
          required: true
    - type: input
      id: bgg_username
      attributes:
          label: BGG Username
          description: BGG username to import as a collection. Leave blank if using a GeekList instead.
          placeholder: "boundary_taproom_bgg"
      validations:
          required: false
    - type: input
      id: geeklist_id
      attributes:
          label: BGG GeekList ID
          description: Numeric ID of a BGG GeekList. Leave blank if using a BGG username instead.
          placeholder: "12345"
      validations:
          required: false
