name: Rollback Main
description: Revert the most recent push to main
labels: ["rollback"]
body:
    - type: markdown
      attributes:
          value: |
              This creates a PR that reverts the most recent commit on `main`. A maintainer will apply the `publish` label to trigger the rollback.
    - type: textarea
      id: reason
      attributes:
          label: Reason
          description: What went wrong? This is included in the PR description.
          placeholder: "Accidentally pushed incorrect data"
      validations:
          required: true
