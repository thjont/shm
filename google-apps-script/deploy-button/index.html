<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      body { font-family: sans-serif; max-width: 420px; margin: 3rem auto; text-align: center; }
      button {
        font-size: 1.1rem; padding: 0.75rem 1.5rem; margin: 0.5rem;
        border: none; border-radius: 8px; cursor: pointer; color: white;
      }
      #deploy-prod { background: #c0392b; }
      #deploy-stage { background: #2980b9; }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      #status { margin-top: 1.5rem; font-size: 0.95rem; min-height: 3em; }
    </style>
  </head>
  <body>
    <h2>Shiny Hoppy Meeple — Deploy</h2>
    <div>
      <button id="deploy-prod" onclick="run('deployProd')">Deploy Prod</button>
      <button id="deploy-stage" onclick="run('deployStage')">Deploy Stage</button>
    </div>
    <div id="status"></div>
    <script>
      function run(fn) {
        document.querySelectorAll('button').forEach(b => b.disabled = true);
        document.getElementById('status').textContent = 'Triggering…';
        google.script.run
          .withSuccessHandler(function (result) {
            document.getElementById('status').textContent = result.message;
            document.querySelectorAll('button').forEach(b => b.disabled = false);
          })
          .withFailureHandler(function (err) {
            document.getElementById('status').textContent = 'Error: ' + err.message;
            document.querySelectorAll('button').forEach(b => b.disabled = false);
          })[fn]();
      }
    </script>
  </body>
</html>
