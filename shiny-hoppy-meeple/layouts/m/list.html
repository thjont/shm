{{ define "main" }}
<article class="post-single">
  <header class="post-header">
    <h1 class="post-title entry-hint-parent">{{ .Title }}</h1>
  </header>

  <div class="post-content">
    {{ .Content }}

    <div class="bgg-collection">
      {{ range $slug, $member := hugo.Data.members }}
      <a class="bgg-card" href="/m/{{ $slug }}/">
        <div class="bgg-card-body">
          <h3>{{ $member.owner }}</h3>
          <span class="bgg-year">{{ $member.count }} game{{ if ne $member.count 1 }}s{{ end }}</span>
        </div>
      </a>
      {{ end }}
    </div>
  </div>
</article>
{{ end }}
