{{ define "main" }}
<article class="post-single">
  <header class="post-header">
    <h1 class="post-title entry-hint-parent">{{ .Title }}</h1>
  </header>

  <div class="post-content">
    {{ .Content }}

    <div class="bgg-collection">
      {{ range $slug, $config := (index hugo.Data "members-config") }}
      {{ $member := index hugo.Data.members $slug }}
      <a class="bgg-card" href="/m/{{ $slug }}/">
        <div class="bgg-card-body">
          <h3>{{ $config.display_name }}</h3>
          {{ with $member }}
          <span class="bgg-year">{{ .count }} game{{ if ne .count 1 }}s{{ end }}</span>
          {{ end }}
        </div>
      </a>
      {{ end }}
    </div>
  </div>
</article>
{{ end }}
