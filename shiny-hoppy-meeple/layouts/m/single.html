{{ define "main" }}
{{ $member := .Params.member }}
<article class="post-single">
  <header class="post-header">
    <p class="bgg-breadcrumb"><a href="/m/">Members</a> &rsaquo; {{ $member.owner }}</p>
    <h1 class="post-title">{{ $member.owner }}</h1>
  </header>

  <div class="post-content">
    <div class="bgg-collection">
      {{ range $member.items }}
      <a class="bgg-card" href="/g/{{ anchorize .name }}/">
        {{ with .thumbnail }}
        <img src="{{ . }}" alt="{{ $.Title }}" loading="lazy" />
        {{ end }}
        <div class="bgg-card-body">
          <h3>{{ .name }}</h3>
          <span class="bgg-year">{{ .year }}</span>
          <div class="bgg-card-meta">
            <span class="shm-rank" data-rank-slug="{{ anchorize .name }}"></span>
          </div>
        </div>
      </a>
      {{ end }}
    </div>
  </div>
</article>
{{ end }}
