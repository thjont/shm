{{ define "main" }}
<article class="post-single">
  <header class="post-header">
    <h1 class="post-title entry-hint-parent">{{ .Title }}</h1>
  </header>

  <div class="post-content">
    <div class="stats-wrap">
      <table class="stats-table" id="stats-table">
        <thead>
          <tr>
            <th class="stats-th stats-sortable stats-num" data-col="play-rank" aria-sort="ascending">Public #</th>
            <th class="stats-th stats-sortable stats-num" data-col="member-rank">Member #</th>
            <th class="stats-th stats-sortable" data-col="name">Game</th>
            <th class="stats-th stats-sortable stats-num" data-col="plays">Public Count</th>
            <th class="stats-th stats-sortable stats-num" data-col="member-plays">Member Count</th>
          </tr>
        </thead>
        <tbody>
          {{ range index hugo.Data "bgg-cache" "games" }}
          <tr data-slug="{{ anchorize .name }}" data-name="{{ .name }}" data-plays="0" data-member-plays="0" data-play-rank="9999" data-member-rank="9999">
            <td class="stats-num stats-play-rank">—</td>
            <td class="stats-num stats-member-rank">—</td>
            <td><a href="/g/{{ anchorize .name }}/">{{ .name }}</a></td>
            <td class="stats-num stats-plays">—</td>
            <td class="stats-num stats-member-plays">
              <span class="member-count">—</span>
              <button class="member-play-btn" data-slug="{{ anchorize .name }}" aria-label="Log a member play for {{ .name }}">+1</button>
            </td>
          </tr>
          {{ end }}
        </tbody>
      </table>
    </div>
  </div>
</article>

<script>
(() => {
  const table = document.getElementById("stats-table");
  const tbody = table.querySelector("tbody");

  // Track current sort: default plays descending (= play-rank ascending)
  let sortCol = "play-rank";
  let sortDir = "asc";

  // ── rank computation ────────────────────────────────────────────────

  function computeRank(rows, dataKey, rankAttr, rankCell) {
    const sorted = [...rows].sort((a, b) => Number(b.dataset[dataKey]) - Number(a.dataset[dataKey]));
    let rank = 1;
    sorted.forEach((row, i) => {
      if (i > 0 && Number(row.dataset[dataKey]) < Number(sorted[i - 1].dataset[dataKey])) rank = i + 1;
      row.dataset[rankAttr] = rank;
      row.querySelector(rankCell).textContent = `#${rank}`;
    });
  }

  // ── sorting ─────────────────────────────────────────────────────────

  const NUM_COLS = new Set(["play-rank", "member-rank", "plays", "member-plays"]);

  // Map data-col → dataset key (camelCase)
  function dataKey(col) {
    return col.replace(/-([a-z])/g, (_, c) => c.toUpperCase());
  }

  function applySort() {
    const rows = Array.from(tbody.querySelectorAll("tr"));
    const key = dataKey(sortCol);
    const isNum = NUM_COLS.has(sortCol);
    const dir = sortDir === "asc" ? 1 : -1;

    rows.sort((a, b) => {
      const av = isNum ? Number(a.dataset[key]) : a.dataset[key] || a.querySelector("td:nth-child(3)").textContent;
      const bv = isNum ? Number(b.dataset[key]) : b.dataset[key] || b.querySelector("td:nth-child(3)").textContent;
      const cmp = isNum ? (av - bv) : av.localeCompare(bv);
      return cmp * dir;
    });

    rows.forEach(row => tbody.appendChild(row));
  }

  function updateHeaders() {
    table.querySelectorAll(".stats-th[data-col]").forEach(th => {
      const col = th.dataset.col;
      th.removeAttribute("aria-sort");
      th.dataset.sortDir = "";
      if (col === sortCol) {
        th.setAttribute("aria-sort", sortDir === "asc" ? "ascending" : "descending");
        th.dataset.sortDir = sortDir;
      }
    });
  }

  // ── header click handler ────────────────────────────────────────────

  table.querySelector("thead").addEventListener("click", e => {
    const th = e.target.closest(".stats-sortable");
    if (!th) return;
    const col = th.dataset.col;
    if (col === sortCol) {
      sortDir = sortDir === "asc" ? "desc" : "asc";
    } else {
      sortCol = col;
      sortDir = NUM_COLS.has(col) ? "desc" : "asc";
    }
    applySort();
    updateHeaders();
  });

  // ── data load ───────────────────────────────────────────────────────

  (async () => {
    try {
      const [playsRes, memberRes] = await Promise.all([
        fetch("/api/plays"),
        fetch("/api/member-plays"),
      ]);
      const counts       = playsRes.ok ? await playsRes.json() : {};
      const memberCounts = memberRes.ok ? await memberRes.json() : {};

      const rows = Array.from(tbody.querySelectorAll("tr"));

      rows.forEach(row => {
        const slug = row.dataset.slug;
        const n = counts[slug]       || 0;
        const m = memberCounts[slug] || 0;
        row.dataset.plays       = n;
        row.dataset.memberPlays = m;
        row.querySelector(".stats-plays").textContent       = n;
        row.querySelector(".member-count").textContent      = m;
      });

      computeRank(rows, "plays",       "playRank",   ".stats-play-rank");
      computeRank(rows, "memberPlays", "memberRank", ".stats-member-rank");

      applySort();
      updateHeaders();
    } catch (e) {
      // API unavailable — leave dashes in place.
    }
  })();

  // ── +1 button handler ───────────────────────────────────────────────

  tbody.addEventListener("click", async e => {
    const btn = e.target.closest(".member-play-btn");
    if (!btn) return;

    const slug = btn.dataset.slug;
    btn.disabled = true;

    try {
      const res = await fetch("/api/member-plays", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ slug }),
      });
      if (!res.ok) throw new Error(res.status);
      const { count } = await res.json();

      const row = btn.closest("tr");
      row.dataset.memberPlays = count;
      row.querySelector(".member-count").textContent = count;

      // Recompute member ranks across all rows
      const rows = Array.from(tbody.querySelectorAll("tr"));
      computeRank(rows, "memberPlays", "memberRank", ".stats-member-rank");

      btn.textContent = "✓";
      setTimeout(() => { btn.textContent = "+1"; btn.disabled = false; }, 1500);
    } catch (e) {
      btn.textContent = "!";
      setTimeout(() => { btn.textContent = "+1"; btn.disabled = false; }, 2000);
    }
  });
})();
</script>
{{ end }}
