{{ define "main" }}
<article class="post-single">
  <header class="post-header">
    <h1 class="post-title entry-hint-parent">{{ .Title }}</h1>
  </header>

  <div class="post-content">
    <table class="stats-table" id="stats-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Game</th>
          <th>Plays</th>
          <th>Member Plays</th>
        </tr>
      </thead>
      <tbody>
        {{ range hugo.Data.games }}
        <tr data-slug="{{ anchorize .name }}" data-plays="0" data-member-plays="0">
          <td class="stats-rank">—</td>
          <td><a href="/g/{{ anchorize .name }}/">{{ .name }}</a></td>
          <td class="stats-plays">—</td>
          <td class="stats-member-plays">
            <span class="member-count">—</span>
            <button class="member-play-btn" data-slug="{{ anchorize .name }}" aria-label="Log a member play for {{ .name }}">+1</button>
          </td>
        </tr>
        {{ end }}
      </tbody>
    </table>
  </div>
</article>

<script>
(async () => {
  try {
    const [playsRes, memberRes] = await Promise.all([
      fetch("/api/plays"),
      fetch("/api/member-plays"),
    ]);

    const counts = playsRes.ok ? await playsRes.json() : {};
    const memberCounts = memberRes.ok ? await memberRes.json() : {};

    const tbody = document.querySelector("#stats-table tbody");
    const rows = Array.from(tbody.querySelectorAll("tr"));

    rows.forEach(row => {
      const slug = row.dataset.slug;
      const n = counts[slug] || 0;
      const m = memberCounts[slug] || 0;
      row.dataset.plays = n;
      row.dataset.memberPlays = m;
      row.querySelector(".stats-plays").textContent = n;
      row.querySelector(".member-count").textContent = m;
    });

    rows.sort((a, b) => {
      const diff = Number(b.dataset.plays) - Number(a.dataset.plays);
      if (diff !== 0) return diff;
      return a.querySelector("td:nth-child(2)").textContent
               .localeCompare(b.querySelector("td:nth-child(2)").textContent);
    });

    let rank = 1;
    rows.forEach((row, i) => {
      if (i > 0 && Number(row.dataset.plays) < Number(rows[i - 1].dataset.plays)) rank = i + 1;
      row.querySelector(".stats-rank").textContent = `#${rank}`;
      tbody.appendChild(row);
    });
  } catch (e) {
    // API unavailable — leave dashes in place.
  }
})();

document.querySelector("#stats-table").addEventListener("click", async (e) => {
  const btn = e.target.closest(".member-play-btn");
  if (!btn) return;

  const slug = btn.dataset.slug;
  btn.disabled = true;

  try {
    const res = await fetch("/api/member-plays", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ slug }),
    });
    if (!res.ok) throw new Error(res.status);
    const { count } = await res.json();

    const row = btn.closest("tr");
    row.dataset.memberPlays = count;
    row.querySelector(".member-count").textContent = count;

    btn.textContent = "✓";
    setTimeout(() => { btn.textContent = "+1"; btn.disabled = false; }, 1500);
  } catch (e) {
    btn.textContent = "!";
    setTimeout(() => { btn.textContent = "+1"; btn.disabled = false; }, 2000);
  }
});
</script>
{{ end }}
