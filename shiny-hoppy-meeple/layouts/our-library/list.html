{{ define "main" }}
<article class="post-single">
  <header class="post-header">
    <h1 class="post-title entry-hint-parent">{{ .Title }}</h1>
  </header>

  <div class="post-content">
    {{ .Content }}

    <div class="bgg-collection">
      {{ range .Site.Data.collection.items }}
      <a class="bgg-card" href="/our-library/{{ anchorize .name }}/">
        {{ with .thumbnail }}
        <img src="{{ . }}" alt="{{ $.Title }}" loading="lazy" />
        {{ end }}
        <div class="bgg-card-body">
          <h3>{{ .name }}</h3>
          <span class="bgg-year">{{ .year }}</span>
          <div class="bgg-card-meta">
            {{ with .rating }}<span>★ {{ . }}</span>{{ end }}
            <span class="bgg-scans" data-scan-slug="{{ anchorize .name }}"></span>
            <span class="shm-rank" data-rank-slug="{{ anchorize .name }}"></span>
          </div>
        </div>
      </a>
      {{ end }}
    </div>
  </div>
</article>
{{ end }}
