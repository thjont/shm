baseURL = "https://shiny-hoppy-meeple.pages.dev/"
defaultContentLanguage = "en"
title = "Shiny Hoppy Meeple"
theme = "blowfish"

enableRobotsTXT = true
enableEmoji = true

[pagination]
  pagerSize = 100

[params]
  colorScheme = "blowfish"
  defaultAppearance = "light"
  autoSwitchAppearance = true
  enableSearch = true
  mainSections = ["posts"]
  description = "Board game community meeting in East Belfast. New faces always welcome."
  fingerprintAlgorithm = "sha512"

  [params.author]
    name = "Shiny Hoppy Meeple"
    headline = "Board games in East Belfast"
    bio = """
We're a friendly board game community based in East Belfast. Whether you're a seasoned strategist \
or picking up your first game, you'll find a warm welcome here.

**Join us every Thursday, 7:30–11pm** at [Boundary Taproom](https://www.instagram.com/boundarytaproom/), East Belfast.
"""
    links = [
      { instagram = "https://www.instagram.com/shinyhoppymeepleni/" },
      { github = "https://github.com/thjont/shm" },
    ]

  [params.homepage]
    layout = "profile"
    showRecent = true
    showRecentItems = 3
    showMoreLink = true
    showMoreLinkDest = "/posts/"

  [params.header]
    layout = "basic"

  [params.footer]
    showCopyright = true
    showThemeAttribution = false
    showAppearanceSwitcher = true
    showScrollToTop = true

  [params.article]
    showBreadcrumbs = false
    showDate = true
    showViews = false
    showLikes = false
    showAuthor = false
    showReadingTime = false
    showTableOfContents = false

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[taxonomies]
  tag = "tags"
  category = "categories"
  mechanic = "mechanics"

[outputs]
  home = ["HTML", "RSS", "JSON", "ScanSlugs"]

[outputFormats]
  [outputFormats.ScanSlugs]
    mediaType = "application/json"
    baseName = "scan-slugs"
    isPlainText = true
    notAlternative = true

[menu]
  [[menu.main]]
    name = "Library"
    url = "/library/"
    weight = 2
  [[menu.main]]
    name = "Categories"
    url = "/categories/"
    weight = 3
  [[menu.main]]
    name = "Mechanics"
    url = "/mechanics/"
    weight = 4
  [[menu.main]]
    name = "Members"
    url = "/m/"
    weight = 5
  [[menu.main]]
    name = "Posts"
    url = "/posts/"
    weight = 6
  [[menu.main]]
    name = "About Us"
    url = "/about-us/"
    weight = 7
